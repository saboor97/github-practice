name: Matrix Testing

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python: [3.8, 3.9, 3.10]

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - run: python --version
