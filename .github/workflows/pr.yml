name: PR Validation

on:
  pull_request:
    branches: [main,hook-practice]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install -r requirements.txt
      - run: python -m unittest test_app.py
